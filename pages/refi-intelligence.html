  );

  // ---- AI response state ----
  if (aiResponse) {
    return (
      <div className="insight-panel fade-in" style={{animationDelay: '0.15s'}}>
        <div className="insight-tag">
          Live AI analysis<span className="ai-badge">✦ Claude</span>
        </div>
        <div className="insight-headline">{aiResponse.headline}</div>
        <div className="insight-body">{aiResponse.narrative}</div>
        <div className="insight-rec">
          <strong>Recommendation</strong>
          {aiResponse.recommendation}
        </div>
        {aiError && <div className="ai-error">⚠ {aiError}</div>}
        {renderReanalyzeBtn('Re-analyze with Claude ↻')}
        {renderPromptExpander()}
      </div>
    );
  }

  // ---- Filtered cohort view (no AI yet) ----
  if (isFiltered) {
    return (
      <div className="insight-panel fade-in" style={{animationDelay: '0.15s'}}>
        <div className="insight-tag">Filtered cohort view</div>
        <div className="insight-headline">
          You're now looking at a <em>specific</em> slice of the portfolio.
        </div>
        <div className="insight-body">
          The KPIs and funnel above have re-aggregated against your filters.
          Click <strong>Analyze with Claude</strong> to generate a fresh narrative
          and recommendation against this exact slice — KPIs, channel breakdown,
          and active filters get sent as structured context.
        </div>
        {aiError && <div className="ai-error">⚠ {aiError}</div>}
        {renderReanalyzeBtn('✦ Analyze this cohort with Claude')}
        {lastPrompt && renderPromptExpander()}
      </div>
    );
  }

  // ---- Default canned narrative ----
  return (
    <div className="insight-panel fade-in" style={{animationDelay: '0.15s'}}>
      <div className="insight-tag">What changed this week</div>
      <div className="insight-headline">
        60+ DPD is up 14 bps — and 74% of it is concentrated in one partner channel.
      </div>
      <div className="insight-body">
        <span className="channel-link" onClick={() => addFilter('channel', 'Partner C')}>Partner C</span>
        {' '}is showing a 60+ DPD rate of <code>{partnerCStats.partnerCDelqRate}%</code>,
        roughly <strong>{partnerCStats.multiplier}×</strong> the rate of every other channel
        combined (<code>{partnerCStats.otherDelqRate}%</code>). The pattern shows up almost entirely in the
        first 30 days post-funding, which points to <strong>application-side quality</strong> rather than
        servicing. Cohort drill-down isolates it further to <strong>700–739 FICO + Bachelor's</strong>.
      </div>
      <div className="insight-rec">
        <strong>Recommendation</strong>
        Pause auto-approval threshold for Partner C × 700–739 FICO pending a manual review of the last
        90 days of funded volume. Estimated avoidable loss exposure: ~$420K annualized.
      </div>
      {aiError && <div className="ai-error">⚠ {aiError}</div>}
      {renderReanalyzeBtn('Re-analyze with Claude ✦')}
      {lastPrompt && renderPromptExpander()}
    </div>
  );
}

function CohortHeatmap({ loans, filters, toggleFilter, windowSel, openDrill }) {
  const [showSql, setShowSql] = useState(false);
  const grid = useMemo(() => {
    const m = {};
    FICO_BANDS.forEach(f => {
      m[f] = {};
      DEGREES.forEach(d => { m[f][d] = { total: 0, approved: 0 }; });
    });
    loans.forEach(l => {
      if (l.stage === 'Applied' || l.stage === 'Soft Pull') return;
      const cell = m[l.fico][l.degree];
      cell.total++;
      if (l.stage === 'Approved' || l.stage === 'Funded') cell.approved++;
    });
    return m;
  }, [loans]);

  const colorFor = (rate) => {
    if (rate < 0.50) return `rgba(255, 85, 119, ${0.20 + (0.50 - rate)})`;
    if (rate < 0.70) return `rgba(245, 184, 0, ${0.20 + (rate - 0.50)})`;
    return `rgba(0, 245, 160, ${0.15 + (rate - 0.70) * 1.2})`;
  };

  // ±2σ anomaly detection across all cells with sample size >= 10
  const cohortAnomalies = useMemo(() => {
    const cells = [];
    FICO_BANDS.forEach(f => {
      DEGREES.forEach(d => {
        const c = grid[f][d];
        if (c.total >= 10) {
          cells.push({ fico: f, degree: d, rate: c.approved / c.total });
        }
      });
    });
    const rates = cells.map(c => c.rate);
    const flagged = detectAnomalies(rates, 2);
    const m = {};
    flagged.forEach(a => {
      const cell = cells[a.idx];
      m[cell.fico + '|' + cell.degree] = a;
    });
    return m;
  }, [grid]);
  const anomalyCount = Object.keys(cohortAnomalies).length;

  const isCellActive = (fico, degree) =>
    filters.fico.includes(fico) && filters.degree.includes(degree);

  const handleCellClick = (fico, degree, e) => {
    // Alt/shift-click → quick filter toggle. Plain click → drill-over slide-over.
    if (e && (e.altKey || e.shiftKey)) {
      const ficoActive = filters.fico.includes(fico);
      const degActive = filters.degree.includes(degree);
      if (ficoActive && degActive) {
        toggleFilter('fico', fico, false);
        toggleFilter('degree', degree, false);
      } else {
        if (!ficoActive) toggleFilter('fico', fico, true);
        if (!degActive) toggleFilter('degree', degree, true);
      }
      return;
    }
    if (openDrill) openDrill({ fico, degree });
  };

  return (
    <div className="panel fade-in" style={{animationDelay: '0.2s'}}>
      <div className="cohort-wrap">
        <table className="cohort-table">
          <thead>
            <tr>
              <th style={{textAlign: 'left', paddingLeft: 14}}>FICO ↓ / Degree →</th>
              {DEGREES.map(d => <th key={d}>{d}</th>)}
            </tr>
          </thead>
          <tbody>
            {FICO_BANDS.slice().reverse().map(fico => (
              <tr key={fico}>
                <td className="row-lbl">{fico}</td>
                {DEGREES.map(d => {
                  const cell = grid[fico][d];
                  const rate = cell.total ? cell.approved / cell.total : 0;
                  const active = isCellActive(fico, d);
                  const anomaly = cohortAnomalies[fico + '|' + d];
                  const anomalyClass = anomaly
                    ? (anomaly.direction === 'high' ? ' anomaly-high' : ' anomaly-low')
                    : '';
                  const anomalyTip = anomaly
                    ? ` · ${anomaly.zscore > 0 ? '+' : ''}${anomaly.zscore.toFixed(1)}σ vs cohort mean ${(anomaly.mean*100).toFixed(1)}%`
                    : '';
                  return (
                    <td key={d}
                        className={'cohort-cell' + (active ? ' active-filter' : '') + anomalyClass}
                        style={{background: cell.total ? colorFor(rate) : 'var(--bg-2)'}}
                        title={`${fico} × ${d} — Approval ${(rate*100).toFixed(1)}% on n=${cell.total}${anomalyTip}. Click to drill in · alt-click to filter.`}
                        onClick={(e) => handleCellClick(fico, d, e)}>

function Calculator({ loans }) {
  const [rate, setRate] = useState(7.85);
  const [newRate, setNewRate] = useState(5.45);
  const [balance, setBalance] = useState(58000);
  const [term, setTerm] = useState(120);

  const r = useMemo(() => {
    const monthlyOrig = pmt(rate/100/12, term, balance);
    const monthlyRefi = pmt(newRate/100/12, term, balance);
    const monthlySavings = Math.max(0, monthlyOrig - monthlyRefi);
    const lifetimeSavings = monthlySavings * term;
    return {
      monthlyOrig, monthlyRefi,
      monthlySavings: Math.round(monthlySavings),
      lifetimeSavings: Math.round(lifetimeSavings),
    };
  }, [rate, newRate, balance, term]);

  const hist = useMemo(() => {
    const buckets = [
      { lbl: '<$5K',     min: 0,     max: 5000,    count: 0 },
      { lbl: '$5–10K',   min: 5000,  max: 10000,   count: 0 },
      { lbl: '$10–20K',  min: 10000, max: 20000,   count: 0 },
      { lbl: '$20–35K',  min: 20000, max: 35000,   count: 0 },
      { lbl: '$35–50K',  min: 35000, max: 50000,   count: 0 },
      { lbl: '$50K+',    min: 50000, max: Infinity, count: 0 },
    ];
    loans.filter(l => l.stage === 'Funded').forEach(l => {
      const b = buckets.find(x => l.lifetimeSavings >= x.min && l.lifetimeSavings < x.max);
      if (b) b.count++;
    });
    const max = Math.max(...buckets.map(b => b.count), 1);
    return { buckets, max };
  }, [loans]);

  const yourBucketIdx = hist.buckets.findIndex(b =>
    r.lifetimeSavings >= b.min && r.lifetimeSavings < b.max);
  const pctile = useMemo(() => {
    const all = loans.filter(l => l.stage === 'Funded')
      .map(l => l.lifetimeSavings).sort((a,b) => a-b);
    if (all.length === 0) return 0;
    const below = all.filter(v => v < r.lifetimeSavings).length;
    return Math.round((below / all.length) * 100);
  }, [loans, r.lifetimeSavings]);

  return (
    <div className="calc-grid fade-in" style={{animationDelay: '0.25s'}}>
      <div className="calc-inputs">
        <div style={{marginBottom: 22}}>
          <div className="result-lbl">Borrower scenario</div>
          <div style={{fontFamily: 'Fraunces, serif', fontSize: 16, marginTop: 6, color: 'var(--ink-1)'}}>
            Drop in your numbers — see where you fall in the portfolio.
          </div>
        </div>
        <div className="input-grp">
          <label>Current Rate</label>
          <div className="suffix">
            <input type="number" step="0.05" value={rate}
              onChange={e => setRate(parseFloat(e.target.value) || 0)} />
            <span className="unit">%</span>
          </div>
        </div>
        <div className="input-grp">
          <label>New Refi Rate</label>
          <div className="suffix">
            <input type="number" step="0.05" value={newRate}
              onChange={e => setNewRate(parseFloat(e.target.value) || 0)} />
            <span className="unit">%</span>
          </div>
        </div>
        <div className="input-grp">
          <label>Loan Balance</label>
          <div className="suffix">
            <input type="number" step="1000" value={balance}
              onChange={e => setBalance(parseFloat(e.target.value) || 0)} />
            <span className="unit">$</span>
          </div>
        </div>
        <div className="input-grp">
          <label>Term (months)</label>
          <div className="suffix">
            <input type="number" step="12" value={term}
              onChange={e => setTerm(parseInt(e.target.value) || 0)} />
            <span className="unit">mo</span>
          </div>
        </div>
      </div>

      <div className="calc-results">
        <div className="result-block">
          <div className="result-lbl">Monthly Savings</div>
          <div className="result-val">${r.monthlySavings.toLocaleString()}</div>
          <div className="result-sub">
            ${Math.round(r.monthlyOrig).toLocaleString()}/mo → ${Math.round(r.monthlyRefi).toLocaleString()}/mo
          </div>
        </div>
        <div className="result-block">
          <div className="result-lbl">Lifetime Savings</div>
          <div className="result-val lifetime">${r.lifetimeSavings.toLocaleString()}</div>
          <div className="result-sub">Over the full {term}-month term</div>
        </div>
        <div className="result-block">
          <div className="result-lbl">Where you fit in the portfolio</div>
          <div className="hist-wrap">
            {hist.buckets.map((b, i) => (
              <div key={b.lbl} className="hist-row">
                <div className="hist-lbl">{b.lbl}</div>
                <div className="hist-bar-wrap">
                  <div className="hist-bar" style={{width: (b.count / hist.max * 100) + '%'}}></div>
                  {i === yourBucketIdx && <div className="hist-marker" style={{left: '50%'}}></div>}
                </div>
                <div className="hist-count">{b.count}</div>
              </div>
            ))}
          </div>
          <div className="your-fit">
            ▶ You'd land in the <strong style={{color: 'var(--amber)'}}>{pctile}th percentile</strong> of
            funded borrowers by lifetime savings.
          </div>
        </div>
      </div>
    </div>
  );
}

function ChannelScorecard({ loans, filters, toggleFilter, windowSel }) {
  const [showSql, setShowSql] = useState(false);
  const [sortKey, setSortKey] = useState('funded_volume');
  const [sortDir, setSortDir] = useState('desc');

  const baseRows = useMemo(() => {
    return CHANNELS.map(ch => {
      const chLoans = loans.filter(l => l.channel === ch);
      const funded = chLoans.filter(l => l.stage === 'Funded');
      const decisioned = chLoans.filter(l => l.stage !== 'Applied' && l.stage !== 'Soft Pull');
      const approved = chLoans.filter(l => l.stage === 'Approved' || l.stage === 'Funded');
      const dpd = funded.filter(l => l.delinq === '60+ DPD' || l.delinq === '90+ DPD').length;
      return {
        channel: ch,
        apps_n: chLoans.length,
        funded_n: funded.length,
        funded_volume: funded.reduce((s, l) => s + l.balance, 0),
        approval_rate_pct: decisioned.length ? (approved.length / decisioned.length) * 100 : 0,
        dpd_60_rate_pct: funded.length ? (dpd / funded.length) * 100 : 0,
        avg_lifetime_savings: funded.length
          ? funded.reduce((s, l) => s + l.lifetimeSavings, 0) / funded.length : 0,
      };
    });
  }, [loans]);

  // Risk rank computed independently from sort
  const riskRank = useMemo(() => {
    const m = {};
    [...baseRows]
      .sort((a, b) => b.dpd_60_rate_pct - a.dpd_60_rate_pct)
      .forEach((r, i) => { m[r.channel] = i + 1; });
    return m;
  }, [baseRows]);

  // ±2σ anomaly detection on 60+ DPD across channels with enough volume
  const anomalies = useMemo(() => {
    const eligible = baseRows.filter(r => r.funded_n >= 10);
    const dpds = eligible.map(r => r.dpd_60_rate_pct);
    const flagged = detectAnomalies(dpds, 2);
    const m = {};
    flagged.forEach(a => {
      m[eligible[a.idx].channel] = a;
    });
    return m;
  }, [baseRows]);

  const rows = useMemo(() => {
    const sorted = [...baseRows].sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortDir === 'asc' ? va - vb : vb - va;
    });
    return sorted;
  }, [baseRows, sortKey, sortDir]);

  const handleSort = (key) => {
    if (sortKey === key) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir(typeof baseRows[0][key] === 'string' ? 'asc' : 'desc'); }
  };

  const dpdClass = (r) => r < 1 ? 'low' : r < 5 ? 'mid' : 'high';

  const cols = [
    { key: 'channel',              label: 'Channel',     numeric: false },
    { key: 'apps_n',               label: 'Apps',        numeric: true  },
    { key: 'funded_n',             label: 'Funded',      numeric: true  },
    { key: 'funded_volume',        label: 'Volume',      numeric: true  },
    { key: 'approval_rate_pct',    label: 'Approval',    numeric: true  },
    { key: 'dpd_60_rate_pct',      label: '60+ DPD',     numeric: true  },
    { key: 'avg_lifetime_savings', label: 'Avg Savings', numeric: true  },
  ];

  return (
    <div className="panel">
      <div className="scorecard-wrap">
        <table className="scorecard-table">
          <thead>
            <tr>
              {cols.map(c => (
                <th key={c.key}
                    className={(c.numeric ? 'numeric ' : '') + (sortKey === c.key ? 'sorted' : '')}
                    onClick={() => handleSort(c.key)}>
                  {c.label}
                  {sortKey === c.key && <span className="sort-arrow">{sortDir === 'desc' ? '▼' : '▲'}</span>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map(r => {
              const isActive = filters.channel.includes(r.channel);
              const isPartner = r.channel.startsWith('Partner');
              const isDirect = r.channel === 'Direct';
              const isReferral = r.channel === 'Referral';
              const isTopRisk = riskRank[r.channel] === 1 && r.dpd_60_rate_pct > 0;
              return (
                <tr key={r.channel} className={isActive ? 'row-active' : ''}
                    onClick={() => toggleFilter('channel', r.channel, !isActive)}
                    title={isActive ? 'Click to remove filter' : 'Click to filter dashboard to ' + r.channel}>
                  <td>
                    <div className="channel-cell">
                      <span>{r.channel}</span>
                      {isPartner && <span className="channel-pill partner">Partner</span>}
                      {isDirect && <span className="channel-pill direct">Direct</span>}
                      {isReferral && <span className="channel-pill referral">Referral</span>}
                      {isTopRisk && <span className="risk-flag" title="Highest 60+ DPD rank">⚠</span>}
                    </div>
                  </td>
                  <td className="numeric">{r.apps_n.toLocaleString()}</td>
                  <td className="numeric">{r.funded_n.toLocaleString()}</td>
                  <td className="numeric">${(r.funded_volume / 1e6).toFixed(2)}M</td>
                  <td className="numeric">{r.approval_rate_pct.toFixed(1)}%</td>
                  <td className="numeric">
                    <span className={'dpd-badge ' + dpdClass(r.dpd_60_rate_pct)}>
                      {r.dpd_60_rate_pct.toFixed(2)}%
                    </span>
                    {anomalies[r.channel] && (
                      <span className={'anomaly-chip ' + (anomalies[r.channel].direction === 'high' ? 'high-bad' : 'high-good')}
                        title={'Outlier vs other channels: ' + anomalies[r.channel].zscore.toFixed(1) + 'σ from mean (' + anomalies[r.channel].mean.toFixed(2) + '%)'}>
                        ⚡ {(anomalies[r.channel].zscore > 0 ? '+' : '') + anomalies[r.channel].zscore.toFixed(1)}σ
                      </span>
                    )}
                  </td>
                  <td className="numeric">${Math.round(r.avg_lifetime_savings).toLocaleString()}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="cohort-hint" style={{textAlign: 'center', marginTop: 14}}>
        <kbd>Click</kbd> a row to filter the dashboard · <kbd>Click</kbd> column headers to sort
      </div>
      <div className="panel-footer">
        <button className={'sql-toggle' + (showSql ? ' open' : '')} onClick={() => setShowSql(!showSql)}>
          {showSql ? '⌃ Hide SQL' : '⌄ View SQL'}
        </button>
      </div>
      {showSql && <SqlPanel sql={sqlLibrary.channelScorecard(filters, windowSel)} />}
    </div>
  );
}

// LOAN-LEVEL TABLE (sortable, searchable, paginated)
// ============================================================
function LoanTable({ loans, onRowClick, pageSize = 15, exportName }) {
  const [sortKey, setSortKey] = useState('daysAgo');
  const [sortDir, setSortDir] = useState('asc');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);

  useEffect(() => { setPage(0); }, [search, loans, sortKey, sortDir]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return loans;
    return loans.filter(l =>
      l.id.toLowerCase().includes(q) ||
      l.fico.toLowerCase().includes(q) ||
      l.degree.toLowerCase().includes(q) ||
      l.channel.toLowerCase().includes(q) ||
      l.stage.toLowerCase().includes(q) ||
      l.delinq.toLowerCase().includes(q)
    );
  }, [loans, search]);

  const sorted = useMemo(() => {
    return [...filtered].sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }, [filtered, sortKey, sortDir]);

  const totalPages = Math.max(1, Math.ceil(sorted.length / pageSize));
  const safePage = Math.min(page, totalPages - 1);
  const pageRows = sorted.slice(safePage * pageSize, (safePage + 1) * pageSize);

  const handleSort = (k) => {
    if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(k); setSortDir(typeof loans[0]?.[k] === 'string' ? 'asc' : 'desc'); }
  };

  const stageClass = (s) => {
    const map = {
      'Applied': 's-applied', 'Soft Pull': 's-soft', 'Underwriting': 's-underwriting',
      'Approved': 's-approved', 'Funded': 's-funded', 'Declined': 's-declined',
    };
    return 'stage-pill ' + (map[s] || 's-applied');
  };

  const cols = [
    { k: 'id',              l: 'Loan ID',     n: false },
    { k: 'stage',           l: 'Stage',       n: false },
    { k: 'fico',            l: 'FICO',        n: false },
    { k: 'degree',          l: 'Degree',      n: false },
    { k: 'channel',         l: 'Channel',     n: false },
    { k: 'balance',         l: 'Balance',     n: true  },
    { k: 'refiRate',        l: 'Refi %',      n: true  },
    { k: 'monthlySavings',  l: '$/mo Save',   n: true  },
    { k: 'lifetimeSavings', l: 'Lifetime',    n: true  },
    { k: 'delinq',          l: 'Status',      n: false },
  ];

  const pagerWindow = () => {
    const max = totalPages;
    const cur = safePage;
    const range = [];
    const start = Math.max(0, Math.min(cur - 2, max - 5));
    const end = Math.min(max, start + 5);

// ============================================================
// SCENARIO SIMULATOR (FICO floor + rate bump)
// ============================================================
function ScenarioSimulator({ loans }) {
  const [floorIdx, setFloorIdx] = useState(0);
  const [bump, setBump] = useState(0);

  const baseline = useMemo(() => {
    const funded = loans.filter(l => l.stage === 'Funded');
    const decisioned = loans.filter(l => l.stage !== 'Applied' && l.stage !== 'Soft Pull');
    const approved = loans.filter(l => l.stage === 'Approved' || l.stage === 'Funded');
    const dpdN = funded.filter(l => l.delinq === '60+ DPD' || l.delinq === '90+ DPD').length;
    return {
      n: loans.length,
      fundedN: funded.length,
      volume: funded.reduce((s, l) => s + l.balance, 0),
      apprRate: decisioned.length ? (approved.length / decisioned.length) * 100 : 0,
      dpdRate: funded.length ? (dpdN / funded.length) * 100 : 0,
      avgSavings: funded.length ? funded.reduce((s, l) => s + l.lifetimeSavings, 0) / funded.length : 0,
    };
  }, [loans]);

  const scenario = useMemo(() => {
    const passed = loans.filter(l => FICO_BANDS.indexOf(l.fico) >= floorIdx);
    const sFunded = passed.filter(l => l.stage === 'Funded');
    const sDec = passed.filter(l => l.stage !== 'Applied' && l.stage !== 'Soft Pull');
    const sAppr = passed.filter(l => l.stage === 'Approved' || l.stage === 'Funded');

    let volume = 0, savings = 0;
    sFunded.forEach(l => {
      const newRate = Math.max(3.5, l.refiRate + bump);
      const mOrig = pmt(l.origRate / 100 / 12, l.term, l.balance);
      const mNew = pmt(newRate / 100 / 12, l.term, l.balance);
      const monthly = Math.max(0, mOrig - mNew);
      volume += l.balance;
      savings += monthly * l.term;
    });

    // DPD model: rate bump amplifies risk (each +0.25% → +5% relative); higher floor reduces risk (0.85^floors)
    const baseDpd = sFunded.length
      ? (sFunded.filter(l => l.delinq === '60+ DPD' || l.delinq === '90+ DPD').length / sFunded.length) * 100
      : 0;
    const bumpEff = 1 + (bump / 0.25) * 0.05;
    const floorEff = Math.pow(0.85, floorIdx);
    const adjDpd = Math.max(0, baseDpd * bumpEff * floorEff);

    return {
      n: passed.length,
      fundedN: sFunded.length,
      volume,
      apprRate: sDec.length ? (sAppr.length / sDec.length) * 100 : 0,
      dpdRate: adjDpd,
      avgSavings: sFunded.length ? savings / sFunded.length : 0,
    };
  }, [loans, floorIdx, bump]);

  const fmtCur = (n) => '$' + (Math.abs(n) >= 1e6 ? (n / 1e6).toFixed(2) + 'M' : (n / 1e3).toFixed(0) + 'K');
  const dCls = (v, inverse) => {
    if (Math.abs(v) < 0.005) return 'flat';
    return (inverse ? v < 0 : v > 0) ? 'up' : 'down';
  };
  const arrow = (v) => Math.abs(v) < 0.005 ? '―' : (v > 0 ? '▲' : '▼');

  const dVol = scenario.volume - baseline.volume;
  const dAppr = scenario.apprRate - baseline.apprRate;
  const dDpd = scenario.dpdRate - baseline.dpdRate;
  const dSav = scenario.avgSavings - baseline.avgSavings;

  const floorLabel = ['660+ (all)', '700+', '740+', '780+'][floorIdx];
  const bumpLabel = (bump >= 0 ? '+' : '') + bump.toFixed(2) + '%';

  const narrative = (() => {
    if (floorIdx === 0 && bump === 0) {
      return <span>Move either slider to model a policy change. Volume, approval, DPD, and avg savings re-compute against the same loan pool.</span>;
    }
    const tighter = floorIdx > 0 ? 'tightening to ' + floorLabel : null;
    const rateBump = Math.abs(bump) > 0.001 ? (bump > 0 ? 'bumping rate ' : 'cutting rate ') + Math.abs(bump).toFixed(2) + '%' : null;
    const lever = [tighter, rateBump].filter(Boolean).join(' and ');
    const volPct = baseline.volume > 0 ? (dVol / baseline.volume) * 100 : 0;
    return (
      <span>
        <strong>{lever}</strong> shifts funded volume by {volPct >= 0 ? '+' : ''}{volPct.toFixed(1)}%
        {Math.abs(dDpd) > 0.05 ? <> and 60+ DPD by {dDpd >= 0 ? '+' : ''}{dDpd.toFixed(2)}pts</> : null}.
        {Math.abs(dAppr) > 0.5 ? <> Approval moves {dAppr >= 0 ? '+' : ''}{dAppr.toFixed(1)}pts.</> : null}
        {Math.abs(dSav) > 100 ? <> Avg lifetime savings per borrower {dSav >= 0 ? 'gain' : 'lose'} ${Math.abs(Math.round(dSav)).toLocaleString()}.</> : null}
      </span>
    );
  })();

  return (
    <div className="sim-grid">
      <div className="sim-controls">
        <div style={{marginBottom: 18}}>
          <div className="result-lbl">Risk lever scenario</div>
          <div style={{fontFamily: 'Fraunces, serif', fontSize: 15, marginTop: 6, color: 'var(--ink-1)', lineHeight: 1.55}}>
            Tighten the FICO floor or shift the offered refi rate. The model re-prices every loan and re-projects DPD.
          </div>
        </div>

        <div className="sim-slider-grp">
          <div className="sim-slider-head">
            <span className="sim-slider-lbl">Min FICO band</span>
            <span className="sim-slider-val">{floorLabel}</span>
          </div>
          <input type="range" className="sim-slider"
            min={0} max={3} step={1} value={floorIdx}
            onChange={e => setFloorIdx(parseInt(e.target.value))} />
          <div className="sim-slider-tag">Drop applications below this band</div>
        </div>

        <div className="sim-slider-grp">
          <div className="sim-slider-head">
            <span className="sim-slider-lbl">Refi rate adjustment</span>
            <span className="sim-slider-val" style={{color: bump > 0 ? 'var(--rose)' : bump < 0 ? 'var(--green)' : 'var(--cyan)'}}>{bumpLabel}</span>
          </div>
          <input type="range" className="sim-slider"
            min={-1.5} max={1.5} step={0.25} value={bump}
            onChange={e => setBump(parseFloat(e.target.value))} />
          <div className="sim-slider-tag">Add or subtract from offered refi APR</div>
        </div>

        <button className="reanalyze-btn" style={{marginTop: 8}}
          onClick={() => { setFloorIdx(0); setBump(0); }}>
          ↺ Reset to baseline
        </button>
      </div>

      <div className="sim-results">
        <div className="sim-results-grid">
          <div className="sim-cell">
            <div className="sim-cell-lbl">Funded Volume</div>
            <div className="sim-cell-base">{fmtCur(baseline.volume)}</div>
            <div className="sim-cell-sim">→ {fmtCur(scenario.volume)}</div>
            <div className={'sim-cell-delta ' + dCls(dVol)}>{arrow(dVol)} {dVol >= 0 ? '+' : '−'}{fmtCur(Math.abs(dVol))}</div>
          </div>
          <div className="sim-cell">
            <div className="sim-cell-lbl">Approval</div>
            <div className="sim-cell-base">{baseline.apprRate.toFixed(1)}%</div>
            <div className="sim-cell-sim">→ {scenario.apprRate.toFixed(1)}%</div>
            <div className={'sim-cell-delta ' + dCls(dAppr)}>{arrow(dAppr)} {dAppr >= 0 ? '+' : ''}{dAppr.toFixed(1)}pts</div>
          </div>
          <div className="sim-cell">
            <div className="sim-cell-lbl">60+ DPD (proj.)</div>
            <div className="sim-cell-base">{baseline.dpdRate.toFixed(2)}%</div>
            <div className="sim-cell-sim">→ {scenario.dpdRate.toFixed(2)}%</div>
            <div className={'sim-cell-delta ' + dCls(dDpd, true)}>{arrow(dDpd)} {dDpd >= 0 ? '+' : ''}{dDpd.toFixed(2)}pts</div>
          </div>
        </div>

        {[
          { lbl: 'Apps in pool',    base: baseline.n,         sim: scenario.n },
          { lbl: 'Funded loans',    base: baseline.fundedN,   sim: scenario.fundedN },
        ].map(row => {
          const max = Math.max(row.base, row.sim, 1);
          return (
            <React.Fragment key={row.lbl}>
              <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.12em', color:'var(--ink-3)', textTransform:'uppercase', marginTop: 8}}>{row.lbl}</div>
              <div className="sim-bars">
                <span style={{color: 'var(--ink-3)'}}>BASE</span>
                <div className="bar-track"><div className="bar-fill base" style={{width: (row.base / max * 100) + '%'}}></div></div>
                <span style={{color: 'var(--ink-1)', textAlign:'right'}}>{row.base.toLocaleString()}</span>
              </div>
              <div className="sim-bars">
                <span style={{color: 'var(--cyan)'}}>SCEN</span>
                <div className="bar-track"><div className="bar-fill" style={{width: (row.sim / max * 100) + '%'}}></div></div>
                <span style={{color: 'var(--cyan)', textAlign:'right'}}>{row.sim.toLocaleString()}</span>
              </div>
            </React.Fragment>
          );
        })}

        <div className="sim-narrative">{narrative}</div>
      </div>
    </div>
  );
}

// ============================================================
// LIVE DECISION LOG FEED
// ============================================================
function DecisionLog({ loans }) {
  const pool = useMemo(() => {
    return loans.filter(l => l.stage !== 'Applied' && l.stage !== 'Soft Pull');
  }, [loans]);

  const [feed, setFeed] = useState(() => {
    const seed = pool.slice().sort((a, b) => a.daysAgo - b.daysAgo).slice(0, 6);
    return seed.map((l, i) => ({
      ...l,
      _ts: new Date(Date.now() - (i + 1) * 12000),
      _key: 'init-' + i,
    }));
  });

  useEffect(() => {
    if (pool.length === 0) return;
    let mounted = true;
    let counter = 0;
    const tick = () => {
      if (!mounted) return;
      const pickFn = pool[Math.floor(Math.random() * pool.length)];
      counter++;
      setFeed(f => [{ ...pickFn, _ts: new Date(), _key: 'tick-' + counter + '-' + Date.now() }, ...f].slice(0, 14));
    };
    const interval = setInterval(tick, 2600 + Math.random() * 800);
    return () => { mounted = false; clearInterval(interval); };
  }, [pool]);

  const fmtTime = (d) => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

  const rowFor = (l) => {
    if (l.stage === 'Funded')      return { cls: '', amt: '+$' + l.balance.toLocaleString(), msg: 'Funded · ' + l.degree + ' · ' + l.channel };
    if (l.stage === 'Approved')    return { cls: '', amt: '+$' + l.balance.toLocaleString(), msg: 'Approved · ' + l.fico + ' · ' + l.channel };
    if (l.stage === 'Declined')    return { cls: 'declined', amt: '−$' + l.balance.toLocaleString(), msg: 'Declined · ' + l.fico + ' · ' + l.channel };
    return { cls: 'referred', amt: '$' + l.balance.toLocaleString(), msg: 'Referred to UW · ' + l.fico + ' · ' + l.channel };
  };

  return (
    <div className="decision-log">
      <div className="decision-log-header">
        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.15em', color: 'var(--ink-2)', textTransform: 'uppercase'}}>
          Decision feed
        </div>
        <span className="live-pill"><span className="live-dot"></span> Live · streaming</span>
      </div>
      {feed.map(l => {
        const r = rowFor(l);
        return (
          <div key={l._key} className="decision-row">
            <span className="decision-time">{fmtTime(l._ts)}</span>
            <span className="decision-id">{l.id}</span>
            <span className="decision-msg">{r.msg}</span>
            <span className={'decision-amt ' + r.cls}>{r.amt}</span>
          </div>
        );
      })}
    </div>
  );
}

// COMPARE MODE (7D vs 30D side-by-side)
// ============================================================
function ComparePanel({ allLoans, filters }) {
  const compute = (windowDays) => {
    const timed = allLoans.filter(l => l.daysAgo <= windowDays);
    const filt = applyFilters(timed, filters);
    const funded = filt.filter(l => l.stage === 'Funded');
    const decisioned = filt.filter(l => l.stage !== 'Applied' && l.stage !== 'Soft Pull');
    const approved = filt.filter(l => l.stage === 'Approved' || l.stage === 'Funded');
    const dpdN = funded.filter(l => l.delinq === '60+ DPD' || l.delinq === '90+ DPD').length;
    return {
      n: filt.length,
      volume: funded.reduce((s, l) => s + l.balance, 0),
      avgSavings: funded.length ? funded.reduce((s, l) => s + l.lifetimeSavings, 0) / funded.length : 0,
      apprRate: decisioned.length ? (approved.length / decisioned.length) * 100 : 0,
      dpdRate: funded.length ? (dpdN / funded.length) * 100 : 0,
      fundedN: funded.length,
    };
  };
  const a = compute(7);
  const b = compute(30);
  const fmtCur = (n) => '$' + (n / 1e6).toFixed(2) + 'M';
  const fmtNum = (n) => Math.round(n).toLocaleString();

  const expectedDaily7 = b.volume / 30 * 7;
  const pacePct = expectedDaily7 > 0 ? ((a.volume - expectedDaily7) / expectedDaily7) * 100 : 0;
  const apprDelta = a.apprRate - b.apprRate;
  const dpdDelta  = a.dpdRate - b.dpdRate;

  const renderCol = (title, tag, tagCls, s) => (
    <div className="compare-col">
      <div className="compare-col-head">
        <div className="compare-col-title">{title}</div>
        <span className={'compare-col-tag ' + tagCls}>{tag}</span>
      </div>
      <div className="compare-kpi"><span className="lbl">Apps</span><span className="val">{s.n.toLocaleString()}</span></div>
      <div className="compare-kpi"><span className="lbl">Funded</span><span className="val">{s.fundedN.toLocaleString()}</span></div>
      <div className="compare-kpi"><span className="lbl">Volume</span><span className="val">{fmtCur(s.volume)}</span></div>
      <div className="compare-kpi"><span className="lbl">Avg Savings</span><span className="val">${fmtNum(s.avgSavings)}</span></div>
      <div className="compare-kpi"><span className="lbl">Approval</span><span className="val">{s.apprRate.toFixed(1)}%</span></div>
      <div className="compare-kpi"><span className="lbl">60+ DPD</span><span className="val">{s.dpdRate.toFixed(2)}%</span></div>
    </div>
  );

  return (
    <div>
      <div className="compare-grid">
        {renderCol('This week', '7D', 'a', a)}
        {renderCol('Trailing month', '30D', 'b', b)}
      </div>
      <div className="anomaly-strip" style={{
        background: 'linear-gradient(90deg, var(--cyan-dim), transparent)',
        borderLeftColor: 'var(--cyan)',
        marginTop: 0,
      }}>
        <span className="anomaly-strip-lbl" style={{color: 'var(--cyan)'}}>▸ Pace check</span>
        <span className="anomaly-strip-item">
          <strong>Funded volume</strong> running {pacePct >= 0 ? '+' : ''}{pacePct.toFixed(1)}% vs the 30-day daily pace
        </span>
        <span className="anomaly-strip-item">
          <strong>Approval</strong> {apprDelta >= 0 ? '+' : ''}{apprDelta.toFixed(1)}pts WoW
        </span>
        <span className="anomaly-strip-item">
          <strong>60+ DPD</strong> {dpdDelta >= 0 ? '+' : ''}{dpdDelta.toFixed(2)}pts WoW
        </span>
      </div>
    </div>
  );
}

OUTPUT FORMAT (strict)
======================
Return ONLY valid JSON:
{
  "headline":      "one short sentence",
  "narrative":     "2-3 sentences",
  "recommendation":"one specific action with $ impact"
}`;

  return (
    <React.Fragment>
      <div className="drawer-backdrop" onClick={onClose}></div>
      <div className="drawer">
        <div className="drawer-head">
          <div>
            <h3>How I built this</h3>
            <span className="sub">Data model · SQL pattern · AI prompt · Stack</span>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Close">×</button>
        </div>
        <div className="drawer-tabs">
          {[
            ['data', 'Data Model'],
            ['sql', 'SQL'],
            ['ai', 'AI Prompt'],
            ['stack', 'Stack'],
          ].map(([k, l]) => (
            <button key={k} className={'drawer-tab ' + (tab === k ? 'active' : '')} onClick={() => setTab(k)}>{l}</button>
          ))}
        </div>
        <div className="drawer-body">
          {tab === 'data' && (
            <React.Fragment>
              <div className="build-section">
                <h4>Loan grain</h4>
                <p>One row per refi application. <code>generateLoans(5000)</code> emits a deterministic synthetic dataset (mulberry32 seed = 42) so every reload reproduces the exact same numbers — important for a demo.</p>
                <div className="schema-block">{`refi.loan_applications
─────────────────────────────────────────────────────
  `}<span className="col">id</span>{`               `}<span className="typ">string</span>{`     `}<span className="com">-- 'L100000'..'L104999'</span>{`
  `}<span className="col">fico_band</span>{`        `}<span className="typ">enum</span>{`       `}<span className="com">-- 660-699 / 700-739 / 740-779 / 780+</span>{`
  `}<span className="col">degree_type</span>{`      `}<span className="typ">enum</span>{`       `}<span className="com">-- Bachelor's, Master's, MBA, JD, MD, PhD</span>{`
  `}<span className="col">channel</span>{`          `}<span className="typ">enum</span>{`       `}<span className="com">-- Direct, Referral, Partner A/B/C</span>{`
  `}<span className="col">stage</span>{`            `}<span className="typ">enum</span>{`       `}<span className="com">-- Applied → Soft Pull → UW → Approved → Funded</span>{`
  `}<span className="col">balance</span>{`          `}<span className="typ">int</span>{`        `}<span className="com">-- outstanding principal</span>{`
  `}<span className="col">orig_rate</span>{`        `}<span className="typ">float</span>{`      `}<span className="com">-- pre-refi APR</span>{`
  `}<span className="col">refi_rate</span>{`        `}<span className="typ">float</span>{`      `}<span className="com">-- offered refi APR</span>{`
  `}<span className="col">term</span>{`             `}<span className="typ">int</span>{`        `}<span className="com">-- months: 60 / 84 / 120 / 180</span>{`
  `}<span className="col">delinq_status</span>{`    `}<span className="typ">enum</span>{`       `}<span className="com">-- Current / 30+ / 60+ / 90+ DPD</span>{`
  `}<span className="col">app_date</span>{`         `}<span className="typ">date</span>{`       `}<span className="com">-- application date; window source</span>{`
  `}<span className="col">fund_date</span>{`        `}<span className="typ">date</span>{`       `}<span className="com">-- vintage cohort source</span>{``}</div>
              </div>
              <div className="build-section">
                <h4>Why synthetic?</h4>
                <p>Real loan data can't ship in a portfolio demo. Generation rules embed a deliberate signal — Partner C carries a built-in approval penalty + DPD bias — so the cohort heatmap and channel scorecard surface a real anomaly worth investigating. Other channels are noisy but unbiased.</p>
              </div>
            </React.Fragment>
          )}
          {tab === 'sql' && (
            <React.Fragment>
              <div className="build-section">
                <h4>Production translation</h4>
                <p>Every panel ships a <code>View SQL</code> button. Each query is auto-rewritten against the active filters and time window — copy/paste into Snowflake against <code>refi.loan_applications</code> and you'll get matching numbers.</p>
              </div>
              <div className="build-section">
                <h4>Pattern: one query per panel</h4>
                <p>BI dashboards die in N+1 territory. Every panel here aggregates in a single pass via conditional aggregation; <code>LAG</code> handles funnel drop-off, window <code>RANK</code> handles risk ranking, and the vintage curve uses <code>GENERATOR</code> for the MOB grid.</p>
                <div className="schema-block">{`WITH base AS (
  SELECT *
  FROM refi.loan_applications
  WHERE app_date >= DATEADD('day', -<window>, CURRENT_DATE())
    AND fico_band IN (<active fico filters>)
)
SELECT
  SUM(CASE WHEN stage='Funded' THEN balance END)         AS funded_volume,
  COUNT_IF(stage IN ('Approved','Funded'))               AS approved_n,
  COUNT_IF(stage NOT IN ('Applied','Soft Pull'))         AS decisioned_n,
  100.0 * COUNT_IF(stage = 'Funded'
                 AND delinq_status IN ('60+ DPD','90+ DPD'))
        / NULLIF(COUNT_IF(stage='Funded'), 0)            AS dpd_60_rate
FROM base;`}</div>
              </div>
              <div className="build-section">
                <h4>WoW + windowed deltas</h4>
                <p>Week-over-week comparisons reuse the same filtered set with a <code>days_ago</code> partition rather than two separate queries — keeps the read pattern symmetric and the query plan simple.</p>
              </div>
            </React.Fragment>
          )}
          {tab === 'ai' && (
            <React.Fragment>
              <div className="build-section">
                <h4>Live AI re-analysis</h4>
                <p>The Insight panel ships the current portfolio snapshot (KPIs, channel breakdown, active filters) to Claude (<code>claude-sonnet-4</code>) and asks for a one-line headline + 2-3 sentence narrative + a recommendation, returned as JSON.</p>
              </div>
              <div className="build-section">
                <h4>Prompt template</h4>
                <div className="schema-block">{promptTemplate}</div>
              </div>
              <div className="build-section">
                <h4>Trust the model less, the rails more</h4>
                <p>Schema is enforced client-side: parse failure surfaces a visible error rather than rendering broken UI. Filter and window changes invalidate the cached response so users never see a stale snapshot. The full prompt is one click away — you can read exactly what the LLM saw.</p>
              </div>
            </React.Fragment>
          )}
          {tab === 'stack' && (
            <React.Fragment>
              <div className="build-section">
                <h4>Single-file React</h4>
                <p>The whole demo is one HTML file: React 18 + Recharts loaded from CDN, Babel standalone for in-browser JSX. No build step, no bundler — drag-and-drop deployment to anywhere that can serve static HTML. The whole thing ships in &lt;100KB unminified.</p>
              </div>
              <div className="build-section">
                <h4>State management</h4>
                <p>All state lives in <code>App</code> as plain <code>useState</code>; child components get props. URL hash mirrors filter / window / compare state, so any view is shareable as a link and survives back-button navigation.</p>
              </div>
              <div className="build-section">
                <h4>Performance</h4>
                <p>Aggregations live in <code>useMemo</code> blocks keyed on <code>(loans, filters, windowSel)</code>, so toggling a chip rerenders the headline numbers without rebuilding the underlying 5,000-row dataset. Sparklines and anomaly detection share the same memoized series.</p>
              </div>
              <div className="build-section">
                <h4>Polish layer</h4>
                <ul>
                  <li>Sparklines + ±2σ anomaly chips on every KPI</li>
                  <li>Click-to-filter cohort heatmap with slide-over drill-down</li>
                  <li>A/B scenario simulator for FICO floor + rate bumps</li>
                  <li>Saveable views via URL hash</li>
                  <li>CSV export per table; PDF via print stylesheet</li>
                  <li>Compare mode: 7D vs 30D side-by-side</li>
                  <li>Live decision feed (simulated stream)</li>
                  <li>Loading skeleton on first paint</li>
                </ul>
              </div>
            </React.Fragment>
          )}
        </div>
        <div className="drawer-footer">
          <span style={{fontFamily:'JetBrains Mono, monospace', fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.12em', textTransform: 'uppercase'}}>
            Press ESC to close
          </span>
          <button className="btn-secondary" onClick={onClose}>Done</button>
        </div>
      </div>
    </React.Fragment>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const initialHash = useMemo(() => decodeHash(), []);
  const [loading, setLoading] = useState(true);
  const [windowSel, setWindowSel] = useState(initialHash.window);
  const [filters, setFilters] = useState(initialHash.filters);
  const [compareMode, setCompareMode] = useState(initialHash.compare);
  const [showKeyModal, setShowKeyModal] = useState(false);
  const [showHibt, setShowHibt] = useState(false);
  const [drillCell, setDrillCell] = useState(null);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('refi_anthropic_key') || '');

  const allLoans = useMemo(() => generateLoans(5000), []);

  // First-paint skeleton — gives the impression of an async data fetch and
  // smooths the first render of 5,000 loans through Babel-transpiled JSX.
  useEffect(() => {
    const t = setTimeout(() => setLoading(false), 380);
    return () => clearTimeout(t);
  }, []);

  // Sync state → URL hash so views are shareable / bookmarkable
  const hashWriteGuardRef = useRef(false);
  useEffect(() => {
    const newHash = encodeHash({ window: windowSel, filters, compare: compareMode });
    const cur = window.location.hash || '';
    if (newHash !== cur && (newHash.length > 0 || cur.length > 0)) {
      hashWriteGuardRef.current = true;
      history.replaceState(null, '', window.location.pathname + window.location.search + (newHash || ' '));
      // strip trailing space if we cleared the hash
      if (!newHash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
      setTimeout(() => { hashWriteGuardRef.current = false; }, 0);
    }
  }, [windowSel, filters, compareMode]);

  // Listen for back/forward hash changes
  useEffect(() => {
    const handler = () => {
      if (hashWriteGuardRef.current) return;
      const s = decodeHash();
      setWindowSel(s.window);
      setFilters(s.filters);
      setCompareMode(s.compare);
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const timedLoans = useMemo(() => {
    const cutoff = windowSel === '7D' ? 7 : windowSel === '30D' ? 30 : 90;
    return allLoans.filter(l => l.daysAgo <= cutoff);
  }, [allLoans, windowSel]);

  const filteredLoans = useMemo(
    () => applyFilters(timedLoans, filters),
    [timedLoans, filters]
  );

  const isFiltered = totalFilterCount(filters) > 0;
  const hasApiKey = !!apiKey;

  const toggleFilter = (key, value, add) => {
    setFilters(prev => {
      const has = prev[key].includes(value);
      if (add === true && has) return prev;
      if (add === false && !has) return prev;
      return {
        ...prev,
        [key]: has ? prev[key].filter(v => v !== value) : [...prev[key], value]
      };
    });
  };

  const addFilter = (key, value) => toggleFilter(key, value, true);
  const removeFilter = (key, value) => toggleFilter(key, value, false);
  const clearFilters = () => setFilters({ fico: [], degree: [], channel: [] });

  const handleSaveKey = (k) => {
    localStorage.setItem('refi_anthropic_key', k);
    setApiKey(k);
  };
  const handleClearKey = () => {
    localStorage.removeItem('refi_anthropic_key');
    setApiKey('');
  };

  const handleExportAll = () => {
    const fname = 'refi-loans_' + windowSel + (isFiltered ? '_filtered' : '') + '.csv';
    exportLoansCSV(filteredLoans, fname);
  };

  if (loading) return <LoadingSkeleton />;

  return (
    <div className="app">
      <Header
        window={windowSel} setWindow={setWindowSel}
        openKeyModal={() => setShowKeyModal(true)}
        hasApiKey={hasApiKey}
        compareMode={compareMode} setCompareMode={setCompareMode}
        openHibt={() => setShowHibt(true)}
        exportAll={handleExportAll}
      />

      <SectionNav />

      <div id="sec-overview"></div>

      <FilterBar
        filters={filters}
        removeFilter={removeFilter}
        clearFilters={clearFilters}
        totalCount={timedLoans.length}
        filteredCount={filteredLoans.length}
      />

      {compareMode ? (
        <ComparePanel allLoans={allLoans} filters={filters} />
      ) : (
        <KpiStrip loans={filteredLoans} isFiltered={isFiltered}
          filters={filters} windowSel={windowSel} />
      )}

      <div className="section" id="sec-funnel">
        <div className="section-head">
          <div className="section-title"><span className="num">01</span>Application Funnel</div>
          <div className="section-meta">
            {filteredLoans.length.toLocaleString()} apps · {windowSel}
            {isFiltered && <span style={{color:'var(--cyan)', marginLeft: 8}}>· filtered</span>}
          </div>
        </div>
        <div className="two-col">
          <Funnel loans={filteredLoans} filters={filters} windowSel={windowSel} />
          <InsightPanel
            loans={filteredLoans}
            addFilter={addFilter}
            isFiltered={isFiltered}
            filters={filters}
            windowSel={windowSel}
            openKeyModal={() => setShowKeyModal(true)}
            hasApiKey={hasApiKey}
          />
        </div>
        <div style={{marginTop: 24}}>
          <DecisionLog loans={timedLoans} />
        </div>
      </div>

      <div className="section" id="sec-cohort">
        <div className="section-head">
          <div className="section-title"><span className="num">02</span>Cohort Approval Heatmap</div>
          <div className="section-meta">FICO band × Degree type · click to drill</div>
        </div>
        <CohortHeatmap loans={timedLoans} filters={filters}
          toggleFilter={toggleFilter} windowSel={windowSel}
          openDrill={setDrillCell} />
      </div>

      <div className="section" id="sec-channels">
        <div className="section-head">
          <div className="section-title"><span className="num">03</span>Channel Scorecard</div>
          <div className="section-meta">Sortable · click row to filter</div>
        </div>
        <ChannelScorecard loans={filteredLoans} filters={filters}
          toggleFilter={toggleFilter} windowSel={windowSel} />
      </div>

      <div className="section" id="sec-vintage">
        <div className="section-head">
          <div className="section-title"><span className="num">04</span>Vintage Curves</div>
          <div className="section-meta">Cumulative 60+ DPD · cohort × MOB</div>
        </div>
        <VintageCurves loans={filteredLoans} filters={filters} windowSel={windowSel} />
      </div>

      <div className="section" id="sec-simulator">
        <div className="section-head">
          <div className="section-title"><span className="num">05</span>A/B Scenario Simulator</div>
          <div className="section-meta">Model FICO floor + rate bump</div>
        </div>
        <ScenarioSimulator loans={filteredLoans} />
      </div>

      <div className="section" id="sec-loans">
        <div className="section-head">
          <div className="section-title"><span className="num">06</span>Loan-Level Detail</div>
          <div className="section-meta">{filteredLoans.length.toLocaleString()} loans · sortable · searchable</div>
        </div>
        <LoanTable loans={filteredLoans} pageSize={15}
          exportName={'refi-loans_' + windowSel + (isFiltered ? '_filtered' : '') + '.csv'} />
      </div>

      <div className="section" id="sec-calculator">
        <div className="section-head">
          <div className="section-title"><span className="num">07</span>Borrower Savings Calculator</div>
          <div className="section-meta">Live · interactive</div>
        </div>
        <Calculator loans={allLoans} />
      </div>

      <Footer />

      <ApiKeyModal
        isOpen={showKeyModal}
        onClose={() => setShowKeyModal(false)}
        currentKey={apiKey}
        onSave={handleSaveKey}
        onClear={handleClearKey}
      />

      <CohortDrillover cell={drillCell} loans={timedLoans}
        onClose={() => setDrillCell(null)}
        addFilter={addFilter} />

      <HowIBuiltDrawer open={showHibt} onClose={() => setShowHibt(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
