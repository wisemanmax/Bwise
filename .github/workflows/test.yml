name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  snowsight:
    name: Snowsight SQL engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
