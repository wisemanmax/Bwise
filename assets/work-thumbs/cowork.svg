<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Cowork autonomous pipeline thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#764ba2" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="lane2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lane3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lane4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="lane5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#475569" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="460" x2="1200" y2="460"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- header chip -->
  <g transform="translate(80,72)">
    <circle cx="9" cy="9" r="6" fill="#34d399"/>
    <circle cx="9" cy="9" r="11" fill="#34d399" fill-opacity="0.18"/>
    <text x="28" y="14" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600" fill="#cbd5e1" letter-spacing="2">LIVE · 5 LANES · 16 AGENTS</text>
  </g>

  <!-- title -->
  <text x="80" y="170" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="80" font-weight="800" fill="#f8fafc" letter-spacing="-1">Cowork</text>
  <text x="80" y="220" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="22" font-weight="500" fill="#94a3b8">Autonomous software-development pipeline</text>

  <!-- 5 swimlanes -->
  <g transform="translate(80,300)">
    <!-- Lane 1: Combat -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="14" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Combat</text>
      <rect x="200" y="6" width="820" height="24" rx="12" fill="url(#lane)"/>
      <circle cx="1030" cy="18" r="9" fill="#34d399"/>
      <text x="1052" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">PR #214</text>
    </g>
    <!-- Lane 2: Content -->
    <g transform="translate(0,52)">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="14" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Content</text>
      <rect x="200" y="6" width="540" height="24" rx="12" fill="url(#lane2)"/>
      <circle cx="750" cy="18" r="9" fill="#fbbf24"/>
      <text x="772" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">review</text>
    </g>
    <!-- Lane 3: Run/World -->
    <g transform="translate(0,104)">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="14" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Run / World</text>
      <rect x="200" y="6" width="700" height="24" rx="12" fill="url(#lane3)"/>
      <circle cx="910" cy="18" r="9" fill="#22d3ee"/>
      <text x="932" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">build</text>
    </g>
    <!-- Lane 4: Visuals/UX -->
    <g transform="translate(0,156)">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="14" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Visuals / UX</text>
      <rect x="200" y="6" width="380" height="24" rx="12" fill="url(#lane4)"/>
      <circle cx="590" cy="18" r="9" fill="#22d3ee"/>
      <text x="612" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="12" font-weight="600" fill="#94a3b8">spec</text>
    </g>
    <!-- Lane 5: Catch-all -->
    <g transform="translate(0,208)">
      <rect x="0" y="0" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="14" y="23" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">Catch-all</text>
      <rect x="200" y="6" width="940" height="24" rx="12" fill="url(#lane5)"/>
      <circle cx="1150" cy="18" r="9" fill="#34d399"/>
    </g>
  </g>

  <!-- footer caption -->
  <text x="80" y="640" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="500" fill="#64748b">automation.byheir.com · 24/7 · auto-gate · self-healing</text>
</svg>
