<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="LoanOps Agent Control Plane">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#13131f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#00d9f5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#00d9f5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d9f5"/>
      <stop offset="1" stop-color="#00f5a0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>

  <!-- mono kicker -->
  <text x="80" y="120" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20" letter-spacing="6" fill="#8a8a98">REGULATED&#160;SERVICING&#160;·&#160;AI&#160;CONTROL&#160;PLANE</text>

  <!-- title -->
  <text x="78" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="76" fill="#fafafa">LoanOps</text>
  <text x="78" y="296" font-family="Georgia, 'Times New Roman', serif" font-size="76" fill="#00d9f5" font-style="italic">Agent Control Plane</text>

  <text x="80" y="356" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20" fill="#8a8a98">AI analyst · policy guardrails · MCP tools · tamper-evident audit</text>

  <!-- orchestration node graph -->
  <g transform="translate(80,430)">
    <!-- connectors -->
    <g stroke="url(#line)" stroke-width="2" fill="none" opacity="0.55">
      <path d="M120 60 L320 60"/>
      <path d="M440 60 L640 60"/>
      <path d="M760 60 L960 60"/>
    </g>
    <!-- nodes -->
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#d4d4dc" text-anchor="middle">
      <g>
        <rect x="0" y="30" width="120" height="60" rx="10" fill="#14141f" stroke="#00d9f5" stroke-opacity="0.5"/>
        <text x="60" y="66">Case</text>
      </g>
      <g>
        <rect x="320" y="30" width="120" height="60" rx="10" fill="#14141f" stroke="#00d9f5" stroke-opacity="0.5"/>
        <text x="380" y="66">Analyst</text>
      </g>
      <g>
        <rect x="640" y="30" width="120" height="60" rx="10" fill="#14141f" stroke="#f5b800" stroke-opacity="0.6"/>
        <text x="700" y="66" fill="#f5b800">Guardrail</text>
      </g>
      <g>
        <rect x="960" y="30" width="120" height="60" rx="10" fill="#14141f" stroke="#00f5a0" stroke-opacity="0.6"/>
        <text x="1020" y="66" fill="#00f5a0">Approve</text>
      </g>
    </g>
  </g>

  <!-- status chip -->
  <g transform="translate(80,600)">
    <circle cx="8" cy="0" r="7" fill="#00f5a0"/>
    <text x="26" y="6" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" fill="#8a8a98">PORTFOLIO&#160;DEMO&#160;·&#160;SYNTHETIC&#160;DATA&#160;·&#160;RUNS&#160;IN-BROWSER</text>
  </g>
</svg>
